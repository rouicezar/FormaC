<script>
        // Collapsible Logic
        const toggleBtn = document.getElementById('retrievalToggle');
        const content = document.getElementById('retrievalContent');
        const icon = document.getElementById('toggleIcon');

        toggleBtn.addEventListener('click', () => {
            const isHidden = content.classList.contains('hidden');
            if (isHidden) {
                content.classList.remove('hidden');
                icon.style.transform = 'rotate(180deg)';
            } else {
                content.classList.add('hidden');
                icon.style.transform = 'rotate(0deg)';
            }
        });

        // Hover Micro-interactions
        const inputField = document.querySelector('input');
        inputField.addEventListener('focus', () => {
            inputField.parentElement.classList.add('scale-[1.005]');
        });
        inputField.addEventListener('blur', () => {
            inputField.parentElement.classList.remove('scale-[1.005]');
        });
    </script>
