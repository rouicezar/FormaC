<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>超级管理员登录 - CoreKnowledge</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Source+Han+Sans+SC,+Microsoft+YaHei,+sans-serif:wght@100..900&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#f0f5f1",
                        "secondary-fixed-dim": "#b8cbc5",
                        "on-error": "#ffffff",

                        "tertiary-fixed-dim": "#ffb77d",

                        "surface": "#f6faf7",
                        "inverse-on-surface": "#edf2ee",
                        "surface-bright": "#f6faf7",
                        "inverse-surface": "#2c312f",
                        "on-primary-fixed-variant": "#2f4c45",
                        "on-background": "#181d1b",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#ffdcc3",
                        "surface-tint": "#47645d",
                        "tertiary-container": "#6b3700",
                        "secondary": "#51625d",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#d4e7e1",
                        "on-secondary-fixed": "#0e1e1b",
                        "primary": "#16332d",
                        "surface-container": "#ebefec",
                        "on-primary-fixed": "#02201a",
                        "on-error-container": "#93000a",
                        "surface-variant": "#dfe3e0",
                        "on-primary": "#ffffff",
                        "outline-variant": "#c1c8c5",
                        "error": "#ba1a1a",
                        "primary-fixed": "#c9e9e0",
                        "surface-dim": "#d7dbd8",
                        "on-tertiary-fixed-variant": "#6e3900",
                        "surface-container-highest": "#dfe3e0",
                        "tertiary": "#4a2500",
                        "on-surface": "#181d1b",
                        "secondary-container": "#d4e7e1",
                        "outline": "#727976",
                        "on-surface-variant": "#414846"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "40px",
                        "container-max": "1280px",
                        "lg": "24px",
                        "gutter": "20px",
                        "unit": "4px",
                        "sm": "8px",
                        "xs": "4px",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "body-md": ["\"Source Han Sans SC, Microsoft YaHei, sans-serif\""],
                        "label-md": ["\"Source Han Sans SC, Microsoft YaHei, sans-serif\""],
                        "headline-sm": ["\"Source Han Sans SC, Microsoft YaHei, sans-serif\""],
                        "headline-md": ["\"Source Han Sans SC, Microsoft YaHei, sans-serif\""]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
            font-size: 20px;
        }
        body {
            background-color: #f6faf7;
            color: #181d1b;
        }
        .login-card {
            box-shadow: 0px 2px 8px rgba(45, 74, 67, 0.05);
        }
        .focus-ring:focus {
            outline: none;
            border-color: #16332d;
            box-shadow: 0 0 0 1px #16332d;
        }
    </style>
</head>
<body class="font-body-md text-body-md min-h-screen flex flex-col items-center justify-center p-md">
<!-- Login Container -->
<main class="w-full max-w-[440px] flex flex-col space-y-lg">
<!-- Header Branding & Status -->
<div class="flex flex-col items-center space-y-md">
<div class="flex items-center space-y-sm flex-col">
<div class="w-12 h-12 bg-primary text-on-primary flex items-center justify-center rounded-lg">
<span class="material-symbols-outlined text-[28px]" data-icon="shield_person">shield_person</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">CoreKnowledge</h1>
<p class="font-label-md text-label-md text-on-surface-variant">企业私有知识库系统</p>
</div>
<!-- Status Indicator -->
<div class="flex items-center space-x-md px-md py-sm bg-surface-container-low border border-outline-variant rounded-full">
<div class="flex items-center space-x-xs">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
</span>
<span class="font-label-sm text-label-sm text-on-surface">系统正常运行</span>
</div>
<div class="h-3 w-[1px] bg-outline-variant"></div>
<div class="flex items-center space-x-xs">
<span class="material-symbols-outlined text-[14px] text-secondary" data-icon="dns">dns</span>
<span class="font-label-sm text-label-sm text-secondary">Local_Node_01 已连接</span>
</div>
</div>
</div>
<!-- Login Form Card -->
<div class="login-card bg-surface-container-lowest border border-outline-variant p-xl rounded-xl space-y-lg">
<div class="space-y-xs">
<h2 class="font-headline-sm text-headline-sm text-on-surface">超级管理员登录</h2>
<p class="font-label-md text-label-md text-on-surface-variant">请使用预设的管理员凭据访问核心配置界面</p>
</div>
<form action="#" class="space-y-md" onsubmit="return false;">
<!-- Account Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="account">管理员账号</label>
<div class="relative group">
<span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-outline" data-icon="person">person</span>
<input class="w-full pl-xl pr-md py-md bg-surface border border-outline-variant rounded focus-ring transition-all placeholder:text-outline-variant" id="account" placeholder="请输入管理员账号" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">访问密码</label>
</div>
<div class="relative group">
<span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-outline" data-icon="lock">lock</span>
<input class="w-full pl-xl pr-md py-md bg-surface border border-outline-variant rounded focus-ring transition-all placeholder:text-outline-variant" id="password" placeholder="请输入访问密码" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full py-md bg-primary text-on-primary font-label-md text-label-md rounded hover:bg-opacity-90 active:scale-[0.98] transition-all flex items-center justify-center space-x-xs" type="submit">
<span>验证并进入系统</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Info -->
<footer class="flex flex-col items-center space-y-sm text-center">
<div class="flex items-center space-x-sm font-label-sm text-label-sm text-outline">
<span>本地私有化部署版本 v4.2.0</span>
<span class="w-1 h-1 rounded-full bg-outline-variant"></span>
<span>加密协议 TLS 1.3</span>
</div>
<p class="font-label-sm text-label-sm text-outline-variant max-w-[320px]">
                该系统仅供授权管理员在受保护的企业内网环境下使用。所有登录操作均将被审计并计入 Scanning Logs。
            </p>
</footer>
</main>
<!-- Background Atmospheric Effect -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden opacity-30">
<div class="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] bg-secondary-container blur-[100px] rounded-full"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[300px] h-[300px] bg-primary-fixed-dim blur-[100px] rounded-full"></div>
</div>
<script>
        // Simple micro-interaction for button press
        document.querySelector('form').addEventListener('submit', function(e) {
            const btn = this.querySelector('button');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span><span>正在验证...</span>';

            // Simulation
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }, 2000);
        });
    </script>
</body></html>
